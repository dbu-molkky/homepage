<!DOCTYPE html>

<head>

  <meta name="theme-color" content="#5C3D2E" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="möln" />
  <link rel="apple-touch-icon" href="photo/App_icon.jpeg" />
  <link rel="manifest" href="manifest.json" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">

  <style>
    /* ===== 記事遷移ボタン ===== */
    .link-list {
      display: flex;
      flex-direction: column;
      gap: 0.7rem;
      margin-top: 1.5rem;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      padding: 1rem 1.5rem;
      border-radius: 12px;
      font-size: 0.95rem;
      font-weight: 500;
      font-family: 'Noto Sans JP', sans-serif;
      text-decoration: none;
      transition: all 0.3s ease;
      cursor: pointer;
      letter-spacing: 0.03em;
    }

    .btn-outline {
      background: transparent;
      color: var(--forest);
      border: 1.5px solid rgba(45,90,39,0.35);
      width: 100%;
      box-sizing: border-box;
    }

    .btn-outline:hover {
      background: var(--forest);
      color: #fff;
      border-color: var(--forest);
      transform: translateX(4px);
    }

    .btn-outline:hover .btn-arrow {
      background: rgba(255,255,255,0.2);
      color: #fff;
    }

    .btn-label {
      flex: 1;
      min-width: 0;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }

    .btn-arrow {
      flex-shrink: 0;
      width: 28px;
      height: 28px;
      background: rgba(45,90,39,0.1);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.85rem;
      transition: transform 0.25s, background 0.25s;
      color: var(--forest);
    }

    .btn:hover .btn-arrow {
      transform: translateX(3px);
    }
  </style>
</head>
<body>

  <div class="container">
    <!-- ニュース -->
    <section id="news">
      <div class="section-label">News</div>
      <h2>ニュース一覧</h2>
      <div class="news-body">
        <p>
          
        </p>
      </div>

      <div class="link-list">
        <a class="btn btn-outline" href="./26.05.20.html"><span class="btn-label">2026.05.20　新入生体験会を開催しました</span><span class="btn-arrow">→</span></a>
        <a class="btn btn-outline" href="./25.12.06.html"><span class="btn-label">2025.12.06　TJUP会員校対抗モルック競技大会に参加しました</span><span class="btn-arrow">→</span></a>
        <a class="btn btn-outline" href="./25.11.02.html"><span class="btn-label">2025.11.02　第101回大東祭に出展しました</span><span class="btn-arrow">→</span></a>
        <a class="btn btn-outline" href="./25.08.17.html"><span class="btn-label">2025.08.17　夏の練習会を開催しました</span><span class="btn-arrow">→</span></a>
        <a class="btn btn-outline" href="./24.04.26.html"><span class="btn-label">2024.04.26　モルックサークル「möln」始まります</span><span class="btn-arrow">→</span></a>

      </div>

      <!-- 前の画面に戻るボタン -->
      <div class="back-btn-wrap">
        <a class="back-btn" onclick="history.back(); return false;" href="#">
          <svg viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M10 12L6 8L10 4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          前の画面に戻る
        </a>
      </div>
    </section>
  </div>

  <script>
    // スクロールアニメーション
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          entry.target.classList.add('visible');
        }
      });
    }, { threshold: 0.1 });

    document.querySelectorAll('section').forEach(s => observer.observe(s));
  </script>
</body>
</html>
