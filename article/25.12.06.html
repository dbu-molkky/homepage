<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>モルックサークル「möln」</title>
  <link rel="stylesheet" href="./article.css">
  <link rel="icon" type="image/png" href="photo/favicon.ico" />

  <!-- PWA設定 -->
  <meta name="theme-color" content="#5C3D2E" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="möln" />
  <link rel="apple-touch-icon" href="photo/App_icon.jpeg" />
  <link rel="manifest" href="manifest.json" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">

</head>
<body>

  <div class="container">
    <!-- ニュース -->
    <section id="news">
      <div class="section-label">News</div>
      <h2>TJUP会員校対抗モルック競技大会に参加しました</h2>
      <div class="news-meta">
        <span class="news-date">2025年12月06日</span>
      </div>
      <div class="news-body">
        <p>
          2025年12月6日に山村学園短期大学で開催されたTJUP会員校対抗モルック競技大会に参加しました。山村学園短期大学と大東文化大学の共同運営で本大会を行いました。TJUP会員校の学生と交流することができ、貴重な経験をすることができました。今後も他大学と交流していきたいと思います。</br></br>
        </p>

        <p>TJUP公式の記事は<a href="https://www.tjup.org/8828/">コチラ</a>！</p>
      </div>

      <div class="news-images">
        <div class="news-image-wrap">
          <img src="photo/25.12.06_0001.jpeg" alt="0001" />
        </div>

        <div class="news-image-wrap">
          <img src="photo/25.12.06_0002.jpeg" alt="0002" />
        </div>


      </div>

      <!-- 前の画面に戻るボタン -->
      <div class="back-btn-wrap">
        <a class="back-btn" onclick="history.back(); return false;" href="#">
          <svg viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M10 12L6 8L10 4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          前の画面に戻る
        </a>
      </div>
    </section>
  </div>

  <script>
    // スクロールアニメーション
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          entry.target.classList.add('visible');
        }
      });
    }, { threshold: 0.1 });

    document.querySelectorAll('section').forEach(s => observer.observe(s));
  </script>
</body>
</html>
