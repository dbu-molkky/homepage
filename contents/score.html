<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>モルックサークル「möln」</title>
  <link rel="icon" type="image/png" href="photo/favicon.ico" />
  
  <!-- PWA設定 -->
  <meta name="theme-color" content="#5C3D2E" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="möln" />
  <link rel="apple-touch-icon" href="photo/IMG_0003.jpeg" />
  <link rel="manifest" href="manifest.json" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --wood-dark: #3D2B1F;
      --wood-mid: #6B4423;
      --wood-light: #A0622A;
      --wood-pale: #C8925A;
      --birch: #E8D5B7;
      --birch-light: #F5ECD8;
      --forest: #2D5A27;
      --forest-light: #4A8C42;
      --moss: #7A9E60;
      --sky: #B8D4E8;
      --cream: #FAF5EC;
      --chalk: #FFFDF8;
      --ink: #1A1208;
      --ink-soft: #3D2F1E;
    }

    html { scroll-behavior: smooth; }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Noto Sans JP', sans-serif;
      background: var(--cream);
      color: var(--ink-soft);
      line-height: 1.8;
      overflow-x: hidden;
    }

    .main-container {
      min-height: 100vh;
    }


    /* ===== OPTION BUTTON (右上固定) ===== */
    .option-btn {
      position: fixed;
      top: 1rem;
      right: 1rem;
      z-index: 500;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: rgba(61,43,31,0.85);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1.5px solid rgba(200,146,90,0.4);
      color: var(--birch);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      box-shadow: 0 4px 16px rgba(0,0,0,0.25);
      padding: 0;
      overflow: visible;
      transition: background 0.25s ease;
    }

    .option-btn:hover {
      background: rgba(107,68,35,0.95);
    }

    .option-btn svg {
      width: 20px;
      height: 20px;
    }

    .option-btn.open svg {
      transform: rotate(45deg);
    }

    /* ===== OPTION MODAL ===== */
    .option-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(26,18,8,0.45);
      backdrop-filter: blur(3px);
      -webkit-backdrop-filter: blur(3px);
      z-index: 400;
      animation: fadeOverlay 0.2s ease;
    }

    .option-overlay.open {
      display: block;
    }

    @keyframes fadeOverlay {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .option-panel {
      position: fixed;
      top: 4rem;
      right: 1rem;
      z-index: 450;
      background: var(--chalk);
      border-radius: 18px;
      box-shadow: 0 12px 48px rgba(61,43,31,0.25), 0 2px 8px rgba(0,0,0,0.1);
      border: 1px solid rgba(107,68,35,0.12);
      padding: 1.5rem 1.6rem 1.6rem;
      width: 280px;
      transform-origin: top right;
      animation: popIn 0.22s cubic-bezier(0.34,1.56,0.64,1);
      display: none;
    }

    .option-panel.open {
      display: block;
    }

    @keyframes popIn {
      from { opacity: 0; transform: scale(0.85); }
      to { opacity: 1; transform: scale(1); }
    }

    .option-panel-title {
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--wood-light);
      margin-bottom: 1.1rem;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .option-panel-title::before {
      content: '';
      display: inline-block;
      width: 3px;
      height: 12px;
      background: linear-gradient(180deg, var(--wood-light), var(--wood-mid));
      border-radius: 2px;
    }

    .option-label {
      font-size: 0.88rem;
      font-weight: 500;
      color: var(--ink-soft);
      margin-bottom: 0.7rem;
      display: block;
    }

    /* プリセットボタン群 */
    .preset-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 0.4rem;
      margin-bottom: 1.1rem;
    }

    .preset-btn {
      padding: 0.5rem 0;
      font-size: 0.9rem;
      font-weight: 600;
      font-family: 'Noto Sans JP', sans-serif;
      border: 1.5px solid rgba(107,68,35,0.18);
      border-radius: 10px;
      background: white;
      color: var(--wood-mid);
      cursor: pointer;
      transition: all 0.18s ease;
      width: 100%;
      position: relative;
      overflow: hidden;
    }

    .preset-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, var(--wood-light), var(--wood-mid));
      opacity: 0;
      transition: opacity 0.18s ease;
    }

    .preset-btn span {
      position: relative;
      z-index: 1;
    }

    .preset-btn:hover {
      border-color: var(--wood-light);
      transform: translateY(-1px);
      box-shadow: 0 3px 10px rgba(107,68,35,0.15);
    }

    .preset-btn:hover::before {
      opacity: 0.08;
    }

    .preset-btn.active {
      background: linear-gradient(135deg, var(--wood-light) 0%, var(--wood-mid) 100%);
      border-color: transparent;
      color: white;
      box-shadow: 0 3px 12px rgba(107,68,35,0.3);
    }

    .preset-btn.active::before {
      display: none;
    }

    /* カスタム入力 */
    .custom-row {
      display: flex;
      gap: 0.5rem;
      align-items: center;
      margin-top: 0.5rem;
    }

    .option-input {
      flex: 1;
      padding: 0.55rem 0.8rem;
      font-size: 0.95rem;
      border: 1.5px solid rgba(107,68,35,0.2);
      border-radius: 10px;
      background: white;
      color: var(--ink-soft);
      font-family: 'Noto Sans JP', sans-serif;
      transition: all 0.2s ease;
      -moz-appearance: textfield;
    }

    .option-input::-webkit-inner-spin-button,
    .option-input::-webkit-outer-spin-button {
      -webkit-appearance: none;
    }

    .option-input:focus {
      outline: none;
      border-color: var(--wood-light);
      box-shadow: 0 0 0 3px rgba(160,98,42,0.1);
    }

    .custom-apply-btn {
      padding: 0.55rem 0.9rem;
      font-size: 0.85rem;
      font-weight: 600;
      font-family: 'Noto Sans JP', sans-serif;
      background: linear-gradient(135deg, var(--forest) 0%, var(--forest-light) 100%);
      color: white;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.2s ease;
      box-shadow: 0 3px 10px rgba(45,90,39,0.2);
    }

    .custom-apply-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 5px 14px rgba(45,90,39,0.3);
    }

    /* 現在の設定表示 */
    .current-target-badge {
      margin-top: 1.1rem;
      padding: 0.55rem 0.9rem;
      background: linear-gradient(135deg, var(--birch-light) 0%, var(--birch) 100%);
      border: 1px solid var(--wood-pale);
      border-radius: 10px;
      text-align: center;
      font-size: 0.82rem;
      color: var(--wood-dark);
      font-weight: 500;
    }

    .current-target-badge strong {
      font-family: 'Playfair Display', serif;
      font-size: 1.1rem;
      color: var(--wood-mid);
    }

    /* ===== MAIN CONTAINER ===== */
    .container {
      padding: 5rem 2rem 4rem;
      max-width: 600px;
      margin: auto;
    }

    /* ===== PLAYER BOX ===== */
    .player-box {
      background: white;
      padding: 2.5rem;
      border-radius: 20px;
      box-shadow: 0 8px 30px rgba(61,43,31,0.1);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      position: relative;
      overflow: hidden;
      margin-bottom: 2rem;
      border: 1px solid rgba(107,68,35,0.08);
      animation: fadeInUp 0.6s ease forwards;
    }

    .player-box::before {
      display: none;
    }

    .player-box:hover {
      transform: translateY(-4px);
      box-shadow: 0 16px 40px rgba(61,43,31,0.15);
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ===== INPUTS ===== */
    input[type="text"],
    input[type="tel"] {
      width: 100%;
      padding: 1rem 1.2rem;
      font-size: 1rem;
      margin-bottom: 1.5rem;
      border: 1.5px solid rgba(107,68,35,0.2);
      border-radius: 12px;
      transition: all 0.3s ease;
      background: var(--chalk);
      color: var(--ink-soft);
      font-family: 'Noto Sans JP', sans-serif;
    }

    input[type="text"]:focus,
    input[type="tel"]:focus {
      outline: none;
      border-color: var(--wood-light);
      box-shadow: 0 0 0 3px rgba(160,98,42,0.1);
      background: white;
    }

    /* ===== SCORE BOX ===== */
    .score-box {
      background: linear-gradient(135deg, var(--birch-light) 0%, var(--birch) 100%);
      border: 2px solid var(--wood-pale);
      padding: 1.5rem;
      font-size: 2.2rem;
      margin: 1.5rem 0;
      border-radius: 15px;
      font-weight: bold;
      color: var(--wood-dark);
      text-align: center;
      transition: all 0.3s ease;
      font-family: 'Playfair Display', serif;
    }

    /* 満点表示バッジ */
    .target-indicator {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      font-size: 0.78rem;
      color: var(--wood-light);
      font-weight: 500;
      letter-spacing: 0.05em;
      margin-top: 0.4rem;
    }

    .target-indicator-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--wood-pale);
    }

    .score-red {
      background: linear-gradient(135deg, #fff3e0 0%, #ffe0b2 100%);
      border-color: var(--wood-light);
      color: var(--wood-mid);
      animation: celebrate 1s ease-in-out;
    }

    @keyframes celebrate {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }

    /* ===== BUTTONS ===== */
    button {
      padding: 1rem 2rem;
      font-size: 1rem;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      font-weight: 600;
      font-family: 'Noto Sans JP', sans-serif;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    button::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
      transition: left 0.5s;
    }

    button:hover::before {
      left: 100%;
    }

    .option-btn::before { display: none; }
    .option-btn:hover::before { display: none; }

    .button-group {
      display: flex;
      justify-content: center;
      gap: 1rem;
      margin: 1.5rem 0;
    }

    #addBtn {
      background: var(--forest);
      color: white;
      box-shadow: 0 4px 15px rgba(45,90,39,0.3);
    }

    #addBtn:hover {
      background: var(--forest-light);
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(45,90,39,0.4);
    }

    .undo {
      background: var(--wood-mid);
      color: white;
      box-shadow: 0 4px 15px rgba(107,68,35,0.3);
    }

    .undo:hover {
      background: var(--wood-light);
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(107,68,35,0.4);
    }

    /* ===== BOTTOM BUTTONS ===== */
    .bottom-button {
      padding: 1rem 2rem;
      font-size: 1rem;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      font-weight: 600;
      font-family: 'Noto Sans JP', sans-serif;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
      display: block;
      margin: 1rem auto;
      text-decoration: none;
      text-align: center;
      box-sizing: border-box;
      width: 260px;
      letter-spacing: 0.05em;
    }

    .bottom-button::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
      transition: left 0.5s;
    }

    .bottom-button:hover::before {
      left: 100%;
    }

    .bottom-button:hover {
      transform: translateY(-2px);
      text-decoration: none;
    }

    .reset {
      background: linear-gradient(135deg, #8B3A2F 0%, #6B2C24 100%);
      color: white;
      box-shadow: 0 4px 15px rgba(139,58,47,0.3);
    }

    .reset:hover {
      box-shadow: 0 8px 25px rgba(139,58,47,0.4);
    }

    .home-btn {
      background: var(--forest);
      color: white;
      box-shadow: 0 4px 15px rgba(45,90,39,0.3);
    }

    .home-btn:hover {
      background: var(--forest-light);
      box-shadow: 0 8px 25px rgba(45,90,39,0.4);
    }

    .disabled-btn {
      background: rgba(107,68,35,0.15) !important;
      color: rgba(107,68,35,0.4) !important;
      cursor: not-allowed !important;
      box-shadow: none !important;
    }

    .disabled-btn:hover {
      transform: none !important;
    }

    /* ===== TURN DISPLAY ===== */
    .turn-display {
      text-align: center;
      margin: 1rem 0;
      font-size: 1rem;
      color: var(--wood-light);
      font-weight: 300;
    }

    .turn-display span {
      font-weight: 600;
      color: var(--wood-mid);
      font-family: 'Playfair Display', serif;
    }

    /* ===== STATUS ===== */
    #status {
      text-align: center;
      margin: 1rem 0;
      font-size: 1.05rem;
      min-height: 1.5rem;
      font-weight: 500;
      letter-spacing: 0.05em;
    }

    .disqualified {
      color: #8B3A2F;
      font-weight: bold;
      animation: shake 0.5s ease-in-out;
    }

    .winner {
      color: var(--forest);
      font-weight: bold;
      animation: bounce 1s ease-in-out;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-5px); }
      75% { transform: translateX(5px); }
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }


    /* ===== BACK BUTTON ===== */
    .back-btn-wrap {
      text-align: center;
      margin-top: 1rem;
    }

    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: var(--wood-dark);
      color: var(--birch-light);
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 0.9rem;
      font-weight: 500;
      padding: 0.75rem 1.8rem;
      border-radius: 100px;
      border: none;
      cursor: pointer;
      text-decoration: none;
      box-shadow: 0 4px 16px rgba(61,43,31,0.35);
      transition: all 0.25s ease;
      white-space: nowrap;
    }

    .back-btn:hover {
      background: var(--wood-mid);
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(61,43,31,0.4);
      color: var(--birch-light);
    }

    .back-btn svg {
      width: 16px;
      height: 16px;
      flex-shrink: 0;
    }

    /* ===== SCROLLBAR ===== */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--cream); }
    ::-webkit-scrollbar-thumb { background: var(--wood-pale); border-radius: 3px; }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 768px) {
      .container { padding: 4rem 1.2rem 3rem; }

      .player-box { padding: 2rem 1.5rem; }

      .button-group {
        flex-direction: column;
        gap: 0.5rem;
      }

      button { width: 100%; }

      .bottom-button {
        width: 100%;
        min-width: auto;
      }

      .option-panel {
        width: calc(100vw - 2rem);
        right: 1rem;
      }
    }
  </style>
</head>
<body>

  <!-- ⚙ オプションボタン（右上固定） -->
  <button class="option-btn" id="optionToggleBtn" onclick="toggleOptionPanel()" title="オプション設定" aria-label="オプション設定">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="3"/>
      <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
    </svg>
  </button>

  <!-- オプションオーバーレイ -->
  <div class="option-overlay" id="optionOverlay" onclick="closeOptionPanel()"></div>

  <!-- オプションパネル -->
  <div class="option-panel" id="optionPanel">
    <div class="option-panel-title">オプション設定</div>
    <span class="option-label">満点スコアを選択</span>
    <div class="preset-grid">
      <button class="preset-btn" id="preset-25" onclick="applyPreset(25)"><span>25</span></button>
      <button class="preset-btn active" id="preset-50" onclick="applyPreset(50)"><span>50</span></button>
      <button class="preset-btn" id="preset-75" onclick="applyPreset(75)"><span>75</span></button>
      <button class="preset-btn" id="preset-100" onclick="applyPreset(100)"><span>100</span></button>
    </div>
    <span class="option-label">カスタム値</span>
    <div class="custom-row">
      <input type="number" id="customTargetInput" class="option-input" placeholder="例: 30" min="1" max="999">
      <button class="custom-apply-btn" onclick="applyCustomTarget()">適用</button>
    </div>
    <div class="current-target-badge">
      現在の満点：<strong id="currentTargetDisplay">50</strong> 点
    </div>
  </div>


  <div class="main-container">
    <div class="container">
      <div class="player-box">
        <input type="text" id="name" value="möln Player" onchange="updateName()" placeholder="名前（チーム名）を入力">
        
        <div class="score-box" id="score">0 点</div>
        







        
        <div class="turn-display">
          <p>ターン数：<span id="player-turn">0</span></p>
        </div>
        
        <p id="status"></p>
        
        <input type="tel" id="input" placeholder="倒したピン数を入力（例: 1）">

        <div class="button-group">
          <button onclick="addScore()" id="addBtn">得点追加</button>
          <button onclick="undoScore()" class="undo">戻る</button>
        </div>

        <button onclick="resetGame()" class="reset bottom-button">リセット</button>
      </div>

      <div class="back-btn-wrap">
        <a class="back-btn" onclick="window.history.back(); return false;" href="#">
          <svg viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M10 12L6 8L10 4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          前の画面に戻る
        </a>
      </div>

    </div>

  </div>

  <script>
    let targetScore = 50; // 満点（変更可能）

    let player = {
      name: "möln Player",
      score: 0,
      turn: 0,
      zeroCount: 0,
      disqualified: false
    };

    let history = [];

    // PWA対応
    let deferredPrompt;

    // サービスワーカー登録
    if ('serviceWorker' in navigator) {

    // ===== オプションパネル =====
    function toggleOptionPanel() {
      const panel = document.getElementById('optionPanel');
      const overlay = document.getElementById('optionOverlay');
      const btn = document.getElementById('optionToggleBtn');
      const isOpen = panel.classList.contains('open');
      if (isOpen) {
        closeOptionPanel();
      } else {
        panel.classList.add('open');
        overlay.classList.add('open');
        btn.classList.add('open');
      }
    }

    function closeOptionPanel() {
      document.getElementById('optionPanel').classList.remove('open');
      document.getElementById('optionOverlay').classList.remove('open');
      document.getElementById('optionToggleBtn').classList.remove('open');
    }

    function applyPreset(value) {
      setTargetScore(value);
      // プリセットボタンのactive切り替え
      document.querySelectorAll('.preset-btn').forEach(btn => btn.classList.remove('active'));
      const target = document.getElementById('preset-' + value);
      if (target) target.classList.add('active');
    }

    function applyCustomTarget() {
      const val = parseInt(document.getElementById('customTargetInput').value, 10);
      if (isNaN(val) || val < 1 || val > 999) {
        alert('1〜999の範囲で入力してください。');
        return;
      }
      // プリセットのactiveを外す
      document.querySelectorAll('.preset-btn').forEach(btn => btn.classList.remove('active'));
      // プリセット値と一致する場合はactiveに
      const target = document.getElementById('preset-' + val);
      if (target) target.classList.add('active');
      setTargetScore(val);
      document.getElementById('customTargetInput').value = '';
    }

    function setTargetScore(value) {
      targetScore = value;
      document.getElementById('currentTargetDisplay').textContent = value;
      document.getElementById('targetScoreLabel').textContent = value;
      // ゲームをリセット
      resetGame();
      saveGameState();
    }

    // ===== ゲームロジック =====

    function saveGameState() {
      window.gameState = {
        player: { ...player },
        history: [...history],
        targetScore: targetScore
      };
    }

    function loadGameState() {
      if (window.gameState) {
        player = { ...window.gameState.player };
        history = [...window.gameState.history];
        if (window.gameState.targetScore) {
          targetScore = window.gameState.targetScore;
          document.getElementById('currentTargetDisplay').textContent = targetScore;
          document.getElementById('targetScoreLabel').textContent = targetScore;
          // プリセットのactive更新
          document.querySelectorAll('.preset-btn').forEach(btn => btn.classList.remove('active'));
          const target = document.getElementById('preset-' + targetScore);
          if (target) target.classList.add('active');
        }
        updateDisplay();
      }
    }

    function updateDisplay() {
      document.getElementById("score").textContent = `${player.score} 点`;
      document.getElementById("player-turn").textContent = player.turn;
      document.getElementById("name").value = player.name;
      document.getElementById("targetScoreLabel").textContent = targetScore;
      
      if (player.disqualified) {
        document.getElementById("status").textContent = "失格（0点3回）";
        document.getElementById("status").className = "disqualified";
        disableAddButton();
      } else if (player.score === targetScore) {
        document.getElementById("status").textContent = "あなたの勝ちです！";
        document.getElementById("status").className = "winner";
        document.getElementById("score").classList.add("score-red");
        disableAddButton();
      } else if (player.zeroCount > 0) {
        document.getElementById("status").textContent = `0点連続 ${player.zeroCount} 回です`;
        document.getElementById("status").className = "";
      } else {
        document.getElementById("status").textContent = "";
        document.getElementById("status").className = "";
      }
    }

    // ページ読み込み時にゲーム状態を復元
    window.addEventListener('load', loadGameState);

    function updateName() {
      player.name = document.getElementById("name").value;
      saveGameState();
    }

    function addScore() {
      if (player.disqualified) {
        alert(`${player.name} は失格しています。`);
        return;
      }

      const inputVal = document.getElementById("input").value.trim();
      const scoreInput = parseInt(inputVal, 10);
      document.getElementById("input").value = "";

      if (isNaN(scoreInput) || scoreInput < 0) {
        alert("正しい数字を入力してください。");
        return;
      }

      history.push({
        score: player.score,
        turn: player.turn,
        zeroCount: player.zeroCount,
        disqualified: player.disqualified
      });

      player.turn++;
      document.getElementById("player-turn").textContent = player.turn;

      if (scoreInput === 0) {
        player.zeroCount++;
        if (player.zeroCount >= 3) {
          player.disqualified = true;
          document.getElementById("status").textContent = "失格（0点3回）";
          document.getElementById("status").className = "disqualified";
          disableAddButton();
        } else {
          document.getElementById("status").textContent = `0点連続 ${player.zeroCount} 回です`;
          document.getElementById("status").className = "";
        }
      } else {
        player.zeroCount = 0;
        player.score += scoreInput;

        // 満点を超えた場合は半分に戻す
        if (player.score > targetScore) {
          player.score = Math.floor(targetScore / 2);
        }

        if (player.score === targetScore) {
          document.getElementById("status").textContent = "あなたの勝ちです！";
          document.getElementById("status").className = "winner";
          document.getElementById("score").classList.add("score-red");
          disableAddButton();
        } else {
          document.getElementById("status").textContent = "";
          document.getElementById("status").className = "";
        }
      }

      document.getElementById("score").textContent = `${player.score} 点`;
      saveGameState();
    }

    function disableAddButton() {
      const addBtn = document.getElementById("addBtn");
      addBtn.disabled = true;
      addBtn.classList.add("disabled-btn");
    }

    function enableAddButton() {
      const addBtn = document.getElementById("addBtn");
      addBtn.disabled = false;
      addBtn.classList.remove("disabled-btn");
    }

    function undoScore() {
      if (history.length === 0) {
        alert("戻す履歴がありません。");
        return;
      }

      const lastState = history.pop();
      player.score = lastState.score;
      player.turn = lastState.turn;
      player.zeroCount = lastState.zeroCount;
      player.disqualified = lastState.disqualified;

      document.getElementById("score").textContent = `${player.score} 点`;
      document.getElementById("player-turn").textContent = player.turn;
      document.getElementById("input").value = "";
      enableAddButton();
      document.getElementById("score").classList.remove("score-red");

      if (player.disqualified) {
        document.getElementById("status").textContent = "失格（0点3回）";
        document.getElementById("status").className = "disqualified";
      } else if (player.score === targetScore) {
        document.getElementById("status").textContent = "あなたの勝ちです！";
        document.getElementById("status").className = "winner";
        document.getElementById("score").classList.add("score-red");
      } else if (player.zeroCount > 0) {
        document.getElementById("status").textContent = `0点連続 ${player.zeroCount} 回です`;
        document.getElementById("status").className = "";
      } else {
        document.getElementById("status").textContent = "";
        document.getElementById("status").className = "";
      }
      
      saveGameState();
    }

    function resetGame() {
      player.score = 0;
      player.turn = 0;
      player.zeroCount = 0;
      player.disqualified = false;
      history = [];

      document.getElementById("score").textContent = "0 点";
      document.getElementById("player-turn").textContent = "0";
      document.getElementById("status").textContent = "";
      document.getElementById("status").className = "";
      document.getElementById("input").value = "";
      document.getElementById("score").classList.remove("score-red");
      enableAddButton();
      
      saveGameState();
    }

    // キーボードショートカット
    document.addEventListener('keydown', function(event) {
      // Enterキーで得点追加
      if (event.key === 'Enter' && document.activeElement.id === 'input') {
        event.preventDefault();
        addScore();
      }
      // Ctrl/Cmd + Z で戻る
      if ((event.ctrlKey || event.metaKey) && event.key === 'z') {
        event.preventDefault();
        undoScore();
      }
      // Escでオプションパネルを閉じる
      if (event.key === 'Escape') {
        closeOptionPanel();
      }
    });

    // オフライン対応の通知
    window.addEventListener('online', () => {
      console.log('オンラインになりました');
    });

    window.addEventListener('offline', () => {
      console.log('オフラインになりました');
    });
  </script>
